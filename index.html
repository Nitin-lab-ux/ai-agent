<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harshit AI - WebArclight</title>
    <style>
        /* Professional Dark Theme */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: radial-gradient(circle at center, #1e293b, #0f172a);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }

        /* Header Styling */
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        h1 { margin: 0; font-size: 24px; letter-spacing: 1px; }
        p { color: #94a3b8; font-size: 14px; margin-top: 5px; }

        /* Widget Container Box */
        .agent-box {
            width: 90%;           /* Mobile friendly */
            max-width: 450px;     /* Desktop limit */
            height: 600px;        /* Height fix */
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;     /* Widget ko round corners mein rakhega */
            position: relative;
        }

        /* Loading Text (Agar widget load hone mein time le) */
        .loading-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #64748b;
            font-size: 12px;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>WebArclight AI</h1>
        <p>Connecting to Harshit (Growth Associate)...</p>
    </div>

    <div class="agent-box">
        <div class="loading-text">Loading Interface...</div>
        
        <div id="omni-widget-component" style="width: 100%; height: 100%;"></div>
    </div>

    <script 
        id="omnidimension-web-widget" 
        async 
        src="https://omnidim.io/web_widget.js?secret_key=2e671a05a7d453f9079864dd8e25393f">
    </script>

</body>
</html>
