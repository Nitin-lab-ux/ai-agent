<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call Harshit - WebArclight AI</title>
    <style>
        /* Professional Dark Background */
        body {
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at center, #0f172a, #000000);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            flex-direction: column;
        }

        /* Card Container */
        .card {
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 50px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 90%;
        }

        h1 { margin: 0 0 10px 0; font-size: 28px; }
        p { color: #94a3b8; margin-bottom: 30px; line-height: 1.6; }

        /* --- TUMHARA CUSTOM BUTTON STYLE --- */
        #omni-open-widget-btn {
            background: linear-gradient(135deg, #2563eb, #1d4ed8); /* WebArclight Blue */
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        #omni-open-widget-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -5px rgba(37, 99, 235, 0.6);
        }

        #omni-open-widget-btn:active {
            transform: scale(0.98);
        }

        /* Pulsing Dot Animation */
        .live-dot {
            width: 10px;
            height: 10px;
            background-color: #4ade80; /* Green */
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px #4ade80;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="card">
        <div style="font-size: 50px; margin-bottom: 20px;">🤖</div>

        <h1>Talk to Harshit</h1>
        <p>
            Connect with WebArclight's AI Growth Associate.<br>
            <span style="font-size: 14px; opacity: 0.7;">Discuss Revenue & Strategy (English/Hindi)</span>
        </p>

        <button id="omni-open-widget-btn">
            <span class="live-dot"></span>
            Start Call Now
        </button>
    </div>

    <script 
        id="omnidimension-web-widget" 
        async 
        src="https://omnidim.io/web_widget.js?secret_key=2e671a05a7d453f9079864dd8e25393f">
    </script>

</body>
</html>
